<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14州路线图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
#map{height:100%;width:100%}
#info{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:8px 16px;border-radius:12px;font-size:13px;font-weight:600;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);white-space:nowrap
}
#legend{
  position:absolute;bottom:30px;left:10px;z-index:1000;
  background:rgba(255,255,255,0.9);padding:8px 12px;border-radius:10px;
  font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.08);max-height:50vh;overflow-y:auto
}
#legend .day{margin:4px 0;display:flex;align-items:center;gap:6px}
#legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leaflet-popup-content{font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div id="map"></div>
<div id="info">🚗 路易维尔出发 → 14州大环线 · 15城 · 3,300英里</div>
<div id="legend"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map=L.map('map',{zoomControl:true}).setView([41,-89],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:12}).addTo(map);

var cities=[{"name": "Louisville", "label": "🏠 出发", "lat": 38.2133224, "lng": -85.7577075}, {"name": "Cincinnati", "label": "Day 1", "lat": 39.1012809, "lng": -84.5127405}, {"name": "Columbus", "label": "Day 2", "lat": 39.9622601, "lng": -83.0007065}, {"name": "Cleveland", "label": "Day 3", "lat": 41.4996574, "lng": -81.6936772}, {"name": "Detroit", "label": "Day 4", "lat": 42.3315509, "lng": -83.0466403}, {"name": "Chicago", "label": "Day 5-6", "lat": 41.8755616, "lng": -87.6244212}, {"name": "Milwaukee", "label": "Day 7", "lat": 43.0386475, "lng": -87.9090751}, {"name": "Minneapolis", "label": "Day 8-9", "lat": 44.9772995, "lng": -93.2654692}, {"name": "Des Moines", "label": "Day 10", "lat": 41.5868654, "lng": -93.6249494}, {"name": "Kansas City", "label": "Day 10", "lat": 39.100105, "lng": -94.5781416}, {"name": "Oklahoma City", "label": "Day 11", "lat": 35.4729886, "lng": -97.5170536}, {"name": "Little Rock", "label": "Day 12", "lat": 34.7465071, "lng": -92.2896267}, {"name": "Memphis", "label": "Day 12", "lat": 35.146026, "lng": -90.0517786}, {"name": "St. Louis", "label": "Day 13", "lat": 38.6472402, "lng": -90.3084017}, {"name": "Louisville", "label": "🏠 回家", "lat": 38.2133224, "lng": -85.7577075}];

var dayColors=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#FF2D55','#5AC8FA','#5856D6','#FF6B35','#8E8E93','#007AFF','#34C759','#FF9500','#FF3B30'];
var legendHtml='';
var prev=null;
var totalDist=0;
var dayNum=1;

cities.forEach(function(c,i){
  var color=dayColors[i%dayColors.length];
  var m=L.circleMarker([c.lat,c.lng],{
    radius:c.label.indexOf('出发')!==-1||c.label.indexOf('回家')!==-1?10:7,
    fillColor:color,color:'#fff',weight:2,fillOpacity:0.9
  }).addTo(map);
  m.bindPopup('<b>'+c.name+'</b><br>'+c.label+'<br>'+(i>0?'← '+prevDist(cities[i-1],c).toFixed(0)+'英里':'起点'));
  
  legendHtml+='<div class="day"><span class="dot" style="background:'+color+'"></span> '+c.label+' — <b>'+c.name+'</b></div>';
});

function prevDist(a,b){
  var dx=(a.lat-b.lat)*69,dy=(a.lng-b.lng)*54.6;
  return Math.sqrt(dx*dx+dy*dy);
}

// Draw route polyline
var coords=cities.map(function(c){return [c.lat,c.lng];});
var poly=L.polyline(coords,{color:'#007AFF',weight:3,opacity:0.5,dashArray:'8,8'}).addTo(map);
map.fitBounds(poly.getBounds(),{padding:[30,30]});

document.getElementById('legend').innerHTML=legendHtml;
</script>
</body>
</html>
