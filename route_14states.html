<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14州路线图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
#map{height:100%;width:100%}
#info{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:8px 16px;border-radius:12px;font-size:13px;font-weight:600;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);white-space:nowrap
}
#legend{
  position:absolute;bottom:30px;left:10px;z-index:1000;
  background:rgba(255,255,255,0.9);padding:8px 12px;border-radius:10px;
  font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.08);max-height:50vh;overflow-y:auto
}
#legend .day{margin:4px 0;display:flex;align-items:center;gap:6px}
#legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leaflet-popup-content{font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div id="map"></div>
<div id="info">🚗 路易维尔出发 → 14州大环线 · 15城 · 约5,300公里</div>
<div id="legend"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map=L.map('map',{zoomControl:true}).setView([41,-89],5);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:12,attribution:'高德地图'}).addTo(map);

var cities=[{"name": "路易维尔", "label": "🏠 出发", "lat": 38.2133224, "lng": -85.7577075}, {"name": "辛辛那提", "label": "Day 1", "lat": 39.1012809, "lng": -84.5127405}, {"name": "哥伦布", "label": "Day 2", "lat": 39.9622601, "lng": -83.0007065}, {"name": "克利夫兰", "label": "Day 3", "lat": 41.4996574, "lng": -81.6936772}, {"name": "底特律", "label": "Day 4", "lat": 42.3315509, "lng": -83.0466403}, {"name": "芝加哥", "label": "Day 5-6", "lat": 41.8755616, "lng": -87.6244212}, {"name": "密尔沃基", "label": "Day 7", "lat": 43.0386475, "lng": -87.9090751}, {"name": "明尼阿波利斯", "label": "Day 8-9", "lat": 44.9772995, "lng": -93.2654692}, {"name": "得梅因", "label": "Day 10", "lat": 41.5868654, "lng": -93.6249494}, {"name": "堪萨斯城", "label": "Day 10", "lat": 39.100105, "lng": -94.5781416}, {"name": "俄克拉荷马城", "label": "Day 11", "lat": 35.4729886, "lng": -97.5170536}, {"name": "小石城", "label": "Day 12", "lat": 34.7465071, "lng": -92.2896267}, {"name": "孟菲斯", "label": "Day 12", "lat": 35.146026, "lng": -90.0517786}, {"name": "圣路易斯", "label": "Day 13", "lat": 38.6472402, "lng": -90.3084017}, {"name": "路易维尔", "label": "🏠 回家", "lat": 38.2133224, "lng": -85.7577075}];

var dayColors=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#FF2D55','#5AC8FA','#5856D6','#FF6B35','#8E8E93','#007AFF','#34C759','#FF9500','#FF3B30'];
var legendHtml='';
var prev=null;
var totalDist=0;
var dayNum=1;

cities.forEach(function(c,i){
  var color=dayColors[i%dayColors.length];
  var m=L.circleMarker([c.lat,c.lng],{
    radius:c.label.indexOf('出发')!==-1||c.label.indexOf('回家')!==-1?10:7,
    fillColor:color,color:'#fff',weight:2,fillOpacity:0.9
  }).addTo(map);
  m.bindPopup('<b>'+c.name+'</b><br>'+c.label+'<br>'+(i>0?'← '+(prevDist(cities[i-1],c)*1.609).toFixed(0)+'公里':'起点'));
  
  legendHtml+='<div class="day"><span class="dot" style="background:'+color+'"></span> '+c.label+' — <b>'+c.name+'</b></div>';
});

function prevDist(a,b){
  var dx=(a.lat-b.lat)*69,dy=(a.lng-b.lng)*54.6;
  return Math.sqrt(dx*dx+dy*dy);
}

// Draw route polyline
var coords=cities.map(function(c){return [c.lat,c.lng];});
var poly=L.polyline(coords,{color:'#007AFF',weight:3,opacity:0.5,dashArray:'8,8'}).addTo(map);
map.fitBounds(poly.getBounds(),{padding:[30,30]});

// Add distance+time labels on each segment
cities.forEach(function(c,i){
  if(i===0)return;
  var prev=cities[i-1];
  var distKm=prevDist(prev,c)*1.609;
  var hours=distKm/96; // ~60mph ≈ 96km/h average
  var h=Math.floor(hours);
  var m=Math.round((hours-h)*60);
  if(m===60){h++;m=0;}
  var timeStr=h+'h'+(m>0?m+'min':'');
  var distStr=distKm.toFixed(0)+'km';
  
  var midLat=(prev.lat+c.lat)/2;
  var midLng=(prev.lng+c.lng)/2;
  
  var label=L.divIcon({
    className:'segment-label',
    html:'<div style="background:rgba(255,255,255,0.9);padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.15);color:#007AFF;text-align:center">'+distStr+'<br><span style="font-size:9px;color:#666">🚗 '+timeStr+'</span></div>',
    iconSize:[0,0],
    iconAnchor:[35,0]
  });
  L.marker([midLat,midLng],{icon:label}).addTo(map);
});

document.getElementById('legend').innerHTML=legendHtml;
</script>
</body>
</html>
